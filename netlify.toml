[build]
  command = "npm run build"
  publish = "dist"

# Viktigt: /assets/* först – säkerställ att CSS/JS serveras (inte index.html)
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# SPA – övriga routes serverar index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
